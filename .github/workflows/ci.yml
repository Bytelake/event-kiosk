name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.9"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build environment
        run: cp apps/web/.env.example apps/web/.env

      - name: Build web app
        run: npm run build

      - name: Build Electron shell
        run: npm run build:shell

  package-debian-amd64:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.9"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build environment
        run: cp apps/web/.env.example apps/web/.env

      - name: Build Debian release package (amd64)
        run: npm run package:debian -- amd64

      - name: Upload amd64 package
        uses: actions/upload-artifact@v4
        with:
          name: event-kiosk-debian-amd64
          path: dist/event-kiosk-debian-amd64-*.tar.gz

  container-web:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/containers/Containerfile.web
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/event-kiosk-web:latest
            ghcr.io/${{ github.repository_owner }}/event-kiosk-web:${{ github.sha }}

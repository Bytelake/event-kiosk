name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.9"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build environment
        run: cp apps/web/.env.example apps/web/.env

      - name: Build web app
        run: npm run build

      - name: Build Electron shell
        run: npm run build:shell

  package-debian-amd64:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.9"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare build environment
        run: cp apps/web/.env.example apps/web/.env

      - name: Build Debian release package (amd64)
        run: npm run package:debian -- amd64

      - name: Upload amd64 package
        uses: actions/upload-artifact@v4
        with:
          name: event-kiosk-debian-amd64
          path: dist/event-kiosk-debian-amd64-*.tar.gz

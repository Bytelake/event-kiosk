<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Registration</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: white;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 24px;
        position: relative;
      }
      button {
        min-height: 48px;
        min-width: 120px;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
      }
      .done {
        background: #2563eb;
        color: white;
        position: absolute;
        right: 24px;
      }
      h1 { font-size: 20px; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>Event Registration</h1>
    <button class="done" id="done">Done</button>
    <script>
      document.body.addEventListener("pointerdown", function () {
        window.electronAPI.hideKeyboard();
      });

      document.getElementById("done").addEventListener("click", () => {
        window.electronAPI.closeRegistration();
      });
    </script>
  </body>
</html>
